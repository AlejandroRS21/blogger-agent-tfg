<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Blogger Agent TFG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Lora', serif; }
        .prose h1, .prose h2, .prose h3 { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.05em; margin-top: 2.5rem; margin-bottom: 1.5rem; text-transform: uppercase; line-height: 1; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.8; color: #374151; font-family: 'Inter', sans-serif; font-size: 1.125rem; }
        .prose blockquote { border-left: 8px solid #3b82f6; padding-left: 2rem; margin: 3rem 0; font-family: 'Lora', serif; font-style: italic; font-size: 1.5rem; color: #1f2937; line-height: 1.6; position: relative; }
        .prose ul, .prose ol { margin-bottom: 2rem; padding-left: 2.5rem; }
        .prose li { list-style: square; margin-bottom: 0.75rem; color: #4b5563; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; }
        .prose strong { font-weight: 800; color: #111827; box-shadow: inset 0 -4px 0 rgba(59, 130, 246, 0.2); }
        .prose img { width: 100%; height: auto; border-radius: 1.5rem; margin: 4rem 0; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-black text-gray-900 tracking-tighter">BLOGGER<span class="text-blue-600">IA</span></a>
            <div class="flex gap-6 text-sm font-bold uppercase tracking-widest text-gray-400">
                <a href="index.html" class="text-gray-900 hover:text-blue-600">Volver al Blog</a>
            </div>
        </nav>
    </header>

    <!-- Post Content -->
    <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-24">
        <article id="post-content">
            <div class="animate-pulse space-y-10">
                <div class="h-10 bg-gray-200 rounded-full w-3/4 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded-full w-1/4 mb-12"></div>
                <div class="space-y-4">
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                </div>
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs font-black text-gray-400 uppercase tracking-widest leading-loose">
            © 2026 Blogger Agent TFG<br>
            Powered by Modal + HuggingFace 🤗
        </div>
    </footer>

    <script>
        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (!id) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`posts/${id}.json`);
                if (!response.ok) throw new Error('Post not found');
                const post = await response.json();
                
                document.title = `${post.title} - Blogger Agent`;
                
                const postContainer = document.getElementById('post-content');
                postContainer.innerHTML = `
                    <div class="mb-16 border-b pb-8">
                        <div class="flex items-center gap-2 text-xs font-black uppercase tracking-[0.2em] text-blue-600 mb-6">
                            <span>${post.metadata.tags[0] || 'BLOG'}</span>
                            <span class="bg-gray-200 w-1 h-1 rounded-full"></span>
                            <span class="text-gray-400 font-bold">${post.metadata.date}</span>
                        </div>
                        <h1 class="text-6xl font-[900] text-gray-900 leading-[0.95] tracking-[-0.07em] uppercase mb-8">
                            ${post.title}
                        </h1>
                        <p class="text-2xl font-serif italic text-gray-500 leading-tight">
                            "${post.description}"
                        </p>
                    </div>
                    
                    <div class="prose max-w-none">
                        ${post.html_code}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading post:', error);
                document.getElementById('post-content').innerHTML = `
                    <div class="text-center py-20">
                        <h1 class="text-4xl font-black text-red-600 uppercase mb-4 tracking-tighter">ERROR 404</h1>
                        <p class="text-gray-500 font-serif italic leading-loose">Lo sentimos, este artículo parece haber sido absorbido por la singularidad.</p>
                        <a href="index.html" class="mt-8 inline-block bg-gray-900 text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-gray-800 transition">VOLVER AL BLOG</a>
                    </div>
                `;
            }
        }
        
        loadPost();
    </script>
</body>
</html>
