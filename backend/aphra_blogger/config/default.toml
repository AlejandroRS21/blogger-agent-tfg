# Blogger Agent Configuration

[models]
# Primary LLM provider: "huggingface", "openai", "anthropic", "modal", or "auto"
# "auto" will try HuggingFace first, then fall back to OpenAI
provider = "modal"

# Default LLM model for content generation
default_model = "mistralai/Mixtral-8x7B-Instruct-v0.1"

# Model for style analysis (can use smaller/cheaper model)
style_analysis_model = "mistralai/Mistral-7B-Instruct-v0.2"

# Model for critique (may need more powerful model)
critic_model = "meta-llama/Meta-Llama-3.1-70B-Instruct"

[models.huggingface]
# HuggingFace configuration (primary provider)
api_key_env = "HF_TOKEN"  # or HUGGINGFACE_TOKEN
temperature = 0.7
max_tokens = 2000
# Optional: custom inference endpoint
# endpoint = "https://your-endpoint.huggingface.cloud"

[models.openai]
# OpenAI API configuration (optional fallback)
api_key_env = "OPENAI_API_KEY"
organization = ""
temperature = 0.7
max_tokens = 2000

[models.anthropic]
# Anthropic Claude configuration (optional)
api_key_env = "ANTHROPIC_API_KEY"
temperature = 0.7
max_tokens = 2000

[workflow]
# Workflow configuration
max_iterations = 3
enable_critic = true
verbose = true

[content]
# Content generation settings
min_word_count = 800
max_word_count = 2000
target_tone = "professional_casual"
include_images = true
